<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CKS Wallpaper</title>
    <style>
        body {
            font-size: 16px;
            text-align: center;
            background-color: #050511;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #0b0b15;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: moveBlob 25s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #a855f7, #7c3aed);
            top: -100px;
            left: -100px;
            animation-duration: 20s;
        }

        .blob-2 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #3b82f6, #2563eb);
            bottom: -150px;
            right: -100px;
            animation: moveBlob 22s infinite alternate-reverse ease-in-out;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #ec4899, #db2777);
            top: 40%;
            left: 60%;
            filter: blur(100px);
            animation: pulseBlob 18s infinite ease-in-out;
        }

        @keyframes moveBlob {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(100px, 50px) scale(1.3);
            }
        }

        @keyframes pulseBlob {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1) translate(0, 0);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.5) translate(-50px, -50px);
            }
        }

        .top-section {
            background-color: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(5px);
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .main-title {
            text-align: center;
            color: #e755f7;
            font-family: Arial, sans-serif;
            font-size: 28px;
            text-shadow: 0 0 10px #a855f7, 0 0 20px #a855f7;
            margin: 0 auto 15px auto;
            animation: fadeUp 1s ease forwards;
            cursor: pointer;
        }

        .main-title span {
            color: #e755f7;
            text-decoration: none;
            cursor: pointer;
            transition: text-shadow 0.3s ease;
        }

        .main-title span:hover {
            text-shadow: 0 0 20px #fff, 0 0 30px #a855f7;
        }

        .search-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .search-box {
            display: flex;
            align-items: center;
            background-color: #ffffff;
            border-radius: 25px;
            width: 90%;
            max-width: 800px;
            overflow: hidden;
            animation: fadeUp 1s ease 0.3s forwards;
            opacity: 0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .search-box input {
            flex: 1;
            padding: 10px 15px;
            font-size: 14px;
            border: none;
            outline: none;
            background-color: transparent;
            color: #333;
            text-align: center;
        }

        .search-box button {
            padding: 10px 15px;
            font-size: 16px;
            border: none;
            background-color: transparent;
            color: #4a90e2;
            cursor: pointer;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            padding: 10px 0 5px 0;
            margin: 0;
            justify-content: flex-start;
            overflow-x: auto;
            animation: fadeUp 1s ease 0.6s forwards;
            opacity: 0;
        }

        .nav-menu::-webkit-scrollbar {
            display: none;
        }

        .nav-menu li {
            margin-right: 15px;
            flex-shrink: 0;
        }

        .nav-menu li a, .nav-menu li span {
            color: white;
            text-decoration: none;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
            white-space: nowrap;
            display: inline-block;
            cursor: pointer;
        }

        .nav-menu li a:hover, .nav-menu li span:hover {
            background-color: #ffffff;
            color: #1a1a2e;
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.2);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .wallpapers-section {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 15px;
            max-width: 100%;
            flex: 1;
        }

        .image-card {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            transition: all 0.4s ease;
            background-color: #000;
            aspect-ratio: 16 / 9;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
        }

        .image-card.show-card {
            animation: fadeUpImages 0.5s ease forwards;
        }

        .image-card img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .image-text {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: rgba(0, 0, 0, 0.6);
            color: #ffffff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
        }

        .download-icon {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: rgba(168, 85, 247, 0.8);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            text-decoration: none;
            z-index: 10;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .download-icon:hover {
            background-color: #a855f7;
            transform: scale(1.1);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .download-icon.loading {
            pointer-events: none;
            background-color: rgba(255, 255, 255, 0.3);
        }

        .download-icon.loading::after {
            content: "";
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .image-card:hover {
            transform: translateY(-4px) !important;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .image-card:hover img {
            transform: scale(1.05);
        }

        @keyframes fadeUpImages {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-state {
            grid-column: 1 / -1;
            font-size: 18px;
            color: #a855f7;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .loading-state .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ccc;
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .footer {
            background-color: #1a1a2e;
            color: #a855f7;
            text-align: center;
            padding: 15px;
            font-size: 12px;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(168, 85, 247, 0.6);
        }

        @media (min-width: 769px) {
            .top-section {
                padding: 20px;
            }
            .main-title {
                font-size: 35px;
                margin: 0 auto 20px auto;
            }
            .search-box input {
                font-size: 16px;
                padding: 12px 15px;
            }
            .nav-menu {
                justify-content: center;
                padding: 15px 0 10px 0;
            }
            .nav-menu li {
                margin-right: 20px;
            }
            .nav-menu li a, .nav-menu li span {
                font-size: 14px;
                padding: 8px 16px;
            }
            .wallpapers-section {
                grid-template-columns: repeat(4, 1fr);
                gap: 15px;
                padding: 25px;
            }
            .image-text {
                top: 10px;
                right: 10px;
                font-size: 12px;
                padding: 5px 12px;
            }
            .download-icon {
                width: 35px;
                height: 35px;
                font-size: 16px;
                bottom: 10px;
                right: 10px;
            }
            .image-card:hover {
                transform: translateY(-6px) !important;
                box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            }
            .image-card:hover img {
                transform: scale(1.1);
            }
            .footer {
                padding: 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="top-section">
        <h1 class="main-title"><span id="home-title">CKS Wallpaper</span></h1>
        <div class="search-container">
            <div class="search-box">
                <button id="search-btn">🔍</button>
                <input type="text" id="search-input" placeholder="search...">
            </div>
        </div>
        <ul class="nav-menu">
            <li><span id="home-link">Home</span></li>
            <li><a href="game.html">Game</a></li>
            <li><a href="anime.html">Anime</a></li>
            <li><a href="movie.html">Movie</a></li>
            <li><a href="space.html">Space</a></li>
            <li><a href="animals.html">Animals</a></li>
            <li><a href="nature.html">Nature</a></li>
        </ul>
    </div>

    <div class="wallpapers-section" id="wallpapers-grid">
        <div class="loading-state" id="loading-spinner">
            <div class="spinner"></div>
            <span>Gathering Latest Wallpapers...</span>
        </div>
    </div>

    <div class="footer">
        CKS Wallpaper powered by SFOGO.SCHNEIDER. All rights reserved ©2026
    </div>

    <script>
        const grid = document.getElementById('wallpapers-grid');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');

        document.getElementById('home-title').addEventListener('click', function(e) {
            e.preventDefault();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        document.getElementById('home-link').addEventListener('click', function(e) {
            e.preventDefault();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            searchInput.value = '';
            performSearch();
        });

        const categories = ['anime.html', 'game.html', 'movie.html', 'space.html', 'animals.html', 'nature.html'];

        async function fetchAllCategories() {
            let allCardsData = [];

            for (let i = 0; i < categories.length; i++) {
                try {
                    const response = await fetch(categories[i]);
                    const htmlText = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, 'text/html');

                    const cards = doc.querySelectorAll('.image-card');
                    cards.forEach(card => {
                        const img = card.querySelector('img');
                        if (img && !img.hasAttribute('loading')) {
                            img.setAttribute('loading', 'lazy');
                        }
                        const dateAdded = card.getAttribute('data-added') || '19700101';
                        allCardsData.push({
                            html: card.outerHTML,
                            date: dateAdded
                        });
                    });
                } catch (error) {
                    console.log(`Skipping ${categories[i]}`);
                }
            }

            allCardsData.sort((a, b) => b.date.localeCompare(a.date));

            if (allCardsData.length > 0) {
                const sortedHtml = allCardsData.map(item => item.html).join('');
                grid.innerHTML = sortedHtml;

                const finalCards = grid.querySelectorAll('.image-card');
                finalCards.forEach((card, index) => {
                    setTimeout(() => {
                        card.classList.add('show-card');
                    }, index * 50);
                });

                initDownloadIcons();
                initSearchEvents();
            } else {
                grid.innerHTML = `<div class="loading-state" style="color:#333; background:#fff; padding:20px; border-radius:10px;">
                    No wallpapers found yet.<br>Add images to game.html, anime.html, etc..
                </div>`;
            }
        }

        function performSearch() {
            const query = searchInput.value.trim().toLowerCase();
            const imageCards = document.querySelectorAll('.image-card');
            imageCards.forEach(card => {
                const img = card.querySelector('img');
                if (img) {
                    const imageName = img.alt.toLowerCase();
                    card.style.display = (query === '' || imageName.includes(query)) ? 'block' : 'none';
                }
            });
        }

        function initSearchEvents() {
            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keyup', function(event) {
                if (event.key === 'Enter') performSearch();
            });
        }

        function initDownloadIcons() {
            document.querySelectorAll('.download-icon').forEach(icon => {
                icon.addEventListener('click', async function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const imgElement = this.closest('.image-card').querySelector('img');
                    const imgSrc = imgElement.src;
                    const imgAlt = imgElement.alt || 'CK4-Wallpaper';
                    this.classList.add('loading');
                    this.innerHTML = '';

                    try {
                        const response = await fetch(imgSrc);
                        const blob = await response.blob();
                        const blobUrl = window.URL.createObjectURL(blob);
                        const tempLink = document.createElement('a');
                        tempLink.href = blobUrl;
                        tempLink.download = `${imgAlt}.${blob.type.includes('png') ? 'png' : 'jpg'}`;
                        tempLink.style.display = 'none';
                        document.body.appendChild(tempLink);
                        tempLink.click();
                        setTimeout(() => {
                            document.body.removeChild(tempLink);
                            window.URL.revokeObjectURL(blobUrl);
                        }, 200);
                    } catch (error) {
                        window.open(imgSrc, '_blank');
                    } finally {
                        setTimeout(() => {
                            this.classList.remove('loading');
                            this.innerHTML = '⬇';
                        }, 800);
                    }
                });
            });
        }

        window.onload = fetchAllCategories;
    </script>
</body>
</html>
